<!DOCTYPE html>
<html>
<head>
    <title>Smart Farming 🌱</title>
</head>
<body>

<h1>🌱 Smart Farming System</h1>

<h3>🎤 Speak or Type City Name</h3>

<input type="text" id="city" placeholder="Enter city">
<button onclick="startMic()">🎤 Speak</button>

<br><br>

<label>N:</label>
<input type="number" id="N" value="40">

<label>P:</label>
<input type="number" id="P" value="50">

<label>K:</label>
<input type="number" id="K" value="60">

<br><br>

<button onclick="predict()">Predict Crop</button>

<h2 id="result"></h2>

<script>
function startMic() {
    const recognition = new webkitSpeechRecognition();

    recognition.lang = "en-IN";
    recognition.start();

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        document.getElementById("city").value = text;
    };
}

function predict() {
    let city = document.getElementById("city").value;
    let N = document.getElementById("N").value;
    let P = document.getElementById("P").value;
    let K = document.getElementById("K").value;

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            city: city,
            N: N,
            P: P,
            K: K
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            "🌾 Crop: " + data.crop + "<br>" +
            "🧪 Fertilizer: " + data.fertilizer + "<br>" +
            "🌡 Temp: " + data.temperature + "<br>" +
            "💧 Humidity: " + data.humidity;
    });
}
</script>

</body>
</html>
